prometheus:
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorNamespaceSelector: {}
    serviceMonitorSelector: {}
    retention: 15d
    resources:
      requests:
        memory: 400Mi
        cpu: 300m
      limits:
        memory: 1Gi
        cpu: 500m
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 8Gi

grafana:
  enabled: true
  adminPassword: "admin"
  persistence:
    enabled: true
    size: 5Gi
  resources:
    requests:
      memory: 256Mi
      cpu: 200m
    limits:
      memory: 512Mi
      cpu: 400m
  service:
    type: NodePort
    port: 80
    targetPort: 3000
    nodePort: 30300
  ingress:
    enabled: true
    annotations:
      nginx.ingress.kubernetes.io/rewrite-target: /$2
    hosts:
      - ai-tools
    path: /grafana(/|$)(.*)
    pathType: ImplementationSpecific
  initChownData:
    enabled: true
  sidecar:
    dashboards:
      enabled: true
    datasources:
      enabled: true
  securityContext:
    runAsUser: 472
    runAsGroup: 472
    fsGroup: 472

alertmanager:
  enabled: true
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['job']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: 'null'
    receivers:
      - name: 'null' 