apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-config
  namespace: spe-project
data:
  grafana.ini: |
    [server]
    root_url = http://ai-tools/grafana/
    serve_from_sub_path = true
    [auth]
    disable_login_form = false
    [security]
    allow_embedding = true
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.spe-project.svc.cluster.local:9090/prometheus
        isDefault: true
        editable: true
        version: 1
        jsonData:
          timeInterval: 15s
          queryTimeout: 30s
          httpMethod: GET
          manageAlerts: true
          alertmanagerUid: alertmanager
        secureJsonData:
          {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: spe-project
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:latest
        ports:
        - containerPort: 3000
        volumeMounts:
        - name: grafana-config
          mountPath: /etc/grafana/grafana.ini
          subPath: grafana.ini
        - name: grafana-datasources
          mountPath: /etc/grafana/provisioning/datasources
        env:
        - name: GF_SERVER_ROOT_URL
          value: http://ai-tools/grafana/
        - name: GF_SERVER_SERVE_FROM_SUB_PATH
          value: "true"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
      volumes:
      - name: grafana-config
        configMap:
          name: grafana-config
      - name: grafana-datasources
        configMap:
          name: grafana-config
          items:
            - key: datasources.yaml
              path: datasources.yaml
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: spe-project
spec:
  selector:
    app: grafana
  ports:
  - port: 80
    targetPort: 3000
  type: ClusterIP 